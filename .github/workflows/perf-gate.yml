name: Perf Gate

# Free-threading speed-regression gate (epic-performance.md Wave 2 / T6).
#
# Two entry points:
#   * bootstrap (workflow_dispatch) — capture a committed baseline (ci_gate.json)
#     on CI hardware. A laptop baseline is NOT comparable to a CI run, so the
#     baseline MUST be captured here. The job uploads ci_gate.json as an
#     artifact; commit it via a normal PR (the repo's PR-body checks live there).
#   * gate (pull_request) — compare a single GIL=0 cell against the committed
#     baseline and fail on a per-phase regression beyond tolerance. No-ops (and
#     passes) until a baseline has been committed, so it never blocks PRs before
#     bootstrap. Deliberately NOT wired into branch protection yet — watch it on
#     ~10 PRs for shared-runner flake before promoting it to a required check.
#
# Caveat held honestly: GitHub's shared runners have few cores and noisy
# scheduling, so this gate detects *relative* regression at a fixed cell. It
# does NOT reproduce the absolute free-threading headline (1.94x at 1000 pages),
# which needs real, idle, many-core hardware. The +30% tolerance absorbs runner
# noise; tighten it only after observing real variance.
#
# A third, manual entry point was added for the render-scaling epic (#343/#345):
#   * probe (workflow_dispatch, job=probe) — run benchmarks/probe_render_ceiling.py
#     on CI's free-threaded interpreter. It decides "fixable coherency tax vs
#     hardware ceiling" from a RELATIVE signal (do K isolated processes scale
#     while in-process threads plateau?). Same honesty caveat applies and then
#     some: a 2-4 vCPU shared runner is NOT the idle >=8-physical-core box #344
#     requires, so this run is a contamination-robust DIRECTIONAL data point, not
#     the committed ceiling number. Because contamination only biases the PROCESS
#     side DOWN, a positive (processes >> threads) is still trustworthy. The job
#     records lscpu/nproc so the produced number is always tied to its hardware.

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Which manual job to run"
        type: choice
        options: [probe, bootstrap]
        default: probe
      probe_pages:
        description: "probe: pages per build"
        default: "500"
      probe_procs:
        description: "probe: comma list of process counts (<= nproc)"
        default: "2,4"
      probe_runs:
        description: "probe: median-of-N"
        default: "3"
  pull_request:
    branches: [ main ]

concurrency:
  group: perf-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# The gate is only meaningful if the bootstrapped baseline and the PR-time
# measurement are the SAME cell. Define that cell ONCE here so the two jobs can
# never drift apart (a baseline captured for a different archetype/page count
# would otherwise produce garbage comparisons or a permanently-red gate). The
# script also hard-checks the baseline's recorded cell against the measured one.
env:
  GATE_ARCHETYPE: "blog"
  GATE_PAGES: "100"
  GATE_RUNS: "3"

jobs:
  # Manual: run the render-scaling ceiling probe (#343/#345) on CI's 3.14t.
  # Directional only — see the header caveat; the committed ceiling number must
  # come from the idle >=8-physical-core box of #344.
  probe:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'probe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Record CPU topology (the number is only as honest as its hardware)
        run: |
          echo "## nproc"; nproc
          echo "## lscpu"; lscpu || true
          echo "## /proc/cpuinfo (model + count)"
          grep -E 'model name|physical id|core id' /proc/cpuinfo | sort -u || true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --no-sources --group dev

      - name: Confirm free-threaded interpreter
        run: |
          uv run python -c "import sys; assert not sys._is_gil_enabled(), 'GIL is ON — not a valid probe'; print('OK: GIL disabled')"

      - name: Run ceiling probe (median-of-N)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python benchmarks/probe_render_ceiling.py \
            --pages "${{ inputs.probe_pages }}" \
            --procs "${{ inputs.probe_procs }}" \
            --runs "${{ inputs.probe_runs }}" \
            --json-out probe_render_ceiling.json

      - name: Upload probe result
        uses: actions/upload-artifact@v7
        with:
          name: render-ceiling-probe
          path: probe_render_ceiling.json
          if-no-files-found: error

  # Manual: capture the committed baseline on CI hardware.
  bootstrap:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'bootstrap'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --no-sources --group dev

      - name: Capture gate baseline (GIL=0, median-of-N)
        env:
          CI: "true"
          OMP_NUM_THREADS: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python benchmarks/benchmark_gil_speedup.py \
            --gate-update \
            --archetype "${{ env.GATE_ARCHETYPE }}" \
            --pages "${{ env.GATE_PAGES }}" \
            --runs "${{ env.GATE_RUNS }}"

      - name: Show captured baseline
        run: cat benchmarks/baselines/ci_gate.json

      - name: Upload ci_gate.json
        uses: actions/upload-artifact@v7
        with:
          name: ci-gate-baseline
          path: benchmarks/baselines/ci_gate.json
          if-no-files-found: error

  # On PRs: detect a per-phase speed regression against the committed baseline.
  gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Skip if no baseline committed yet
        id: have_baseline
        run: |
          if [ -f benchmarks/baselines/ci_gate.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No benchmarks/baselines/ci_gate.json yet — run the perf-gate bootstrap job and commit it to enable the gate."
          fi

      - name: Install uv
        if: steps.have_baseline.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        if: steps.have_baseline.outputs.present == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        if: steps.have_baseline.outputs.present == 'true'
        run: uv sync --no-sources --group dev

      - name: Run speed gate (GIL=0, +30% tolerance)
        if: steps.have_baseline.outputs.present == 'true'
        env:
          CI: "true"
          OMP_NUM_THREADS: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python benchmarks/benchmark_gil_speedup.py \
            --gate \
            --tolerance 0.30 \
            --archetype "${{ env.GATE_ARCHETYPE }}" \
            --pages "${{ env.GATE_PAGES }}" \
            --runs "${{ env.GATE_RUNS }}"
