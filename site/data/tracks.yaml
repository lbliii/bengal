# Learning Tracks
# Each track is a curated journey through Bengal documentation.
# Keys must match track_id in the corresponding content/tracks/*.md page.

zero-to-deployed:
  title: "Zero to Deployed"
  description: "Build and deploy your first Bengal site in under an hour."
  duration: "45 min"
  audience: "Complete beginners"
  items:
    - docs/get-started/installation
    - docs/get-started/quickstart-writer
    - docs/get-started/scaffold-your-site
    - docs/examples/sites/build-a-blog
    - docs/ship/deployment/_index
    - docs/tutorials/operations/automate-with-github-actions

content-mastery:
  title: "Content Author Mastery"
  description: "Master advanced Markdown features, directives, and content reuse."
  duration: "60 min"
  audience: "Writers who completed quickstart"
  items:
    - docs/build-sites/write/authoring/_index
    - docs/build-sites/write/authoring/linking
    - docs/build-sites/write/authoring/code-blocks
    - docs/build-sites/write/authoring/tables
    - docs/reference/directives/_index
    - docs/reference/directives/admonitions
    - docs/reference/directives/layout
    - docs/reference/directives/interactive
    - docs/build-sites/write/reuse/_index
    - docs/build-sites/write/reuse/snippets

theme-developer:
  title: "Theme Developer Journey"
  description: "From CSS tweaks to building complete custom themes."
  duration: "90 min"
  audience: "Designers and frontend developers"
  items:
    - docs/get-started/quickstart-themer
    - docs/build-sites/customize/themes/customize
    - docs/tutorials/theming/swizzle-default-theme
    - docs/build-sites/customize/assets/_index
    - docs/build-sites/customize/recipes/_index
    - docs/build-sites/customize/recipes/reading-time
    - docs/build-sites/customize/recipes/list-recent-posts
    - docs/build-sites/customize/templating/_index
    - docs/build-sites/customize/templating/functions
    - docs/reference/theme-variables

team-lead:
  title: "Documentation Team Lead"
  description: "Set up scalable documentation workflows with validation and CI/CD."
  duration: "75 min"
  audience: "Tech writers, doc managers, lead engineers"
  items:
    - docs/build-sites/structure/collections/_index
    - docs/build-sites/extend/sources/_index
    - docs/ship/validate/_index
    - docs/ship/validate/validate-and-fix
    - docs/build-sites/structure/analysis/_index
    - docs/ship/configuration/_index
    - docs/ship/deployment/_index
    - docs/tutorials/operations/automate-with-github-actions

migration-express:
  title: "Migration Express"
  description: "Migrate your existing static site to Bengal while preserving URLs."
  duration: "60 min"
  audience: "Hugo, Sphinx, Docusaurus users"
  items:
    - docs/about/comparison
    - docs/tutorials/migration/_index
    - docs/tutorials/migration/from-hugo
    - docs/tutorials/migration/from-sphinx
    - docs/tutorials/migration/from-docusaurus
    - docs/build-sites/structure/organization/_index
    - docs/build-sites/structure/organization/frontmatter
    - docs/ship/configuration/_index

api-docs-specialist:
  title: "API Documentation Specialist"
  description: "Auto-generate API documentation from source code and specs."
  duration: "60 min"
  audience: "Developer advocates, API teams, SDK maintainers"
  items:
    - docs/build-sites/extend/sources/_index
    - docs/build-sites/extend/sources/autodoc
    - docs/build-sites/extend/custom-sources
    - docs/build-sites/structure/collections/_index
    - docs/ship/validate/_index
    - docs/ship/deployment/_index

versioning-expert:
  title: "Versioning Expert"
  description: "Maintain multiple versions of documentation for different releases."
  duration: "45 min"
  audience: "Library authors, API teams, enterprise docs"
  items:
    - docs/build-sites/structure/versioning/_index
    - docs/build-sites/structure/versioning/folder-mode
    - docs/build-sites/structure/versioning/git-mode
    - docs/build-sites/structure/versioning/cross-version-links
    - docs/build-sites/structure/versioning/directives

performance-optimizer:
  title: "Performance Optimizer"
  description: "Build and maintain large documentation sites efficiently."
  duration: "30 min"
  audience: "DevOps, large doc teams, enterprise"
  items:
    - docs/ship/performance/_index
    - docs/ship/performance/large-sites
    - docs/build-sites/structure/analysis/_index
    - docs/build-sites/structure/analysis/graph
    - docs/about/benchmarks

extension-developer:
  title: "Extension Developer"
  description: "Create custom directives, content sources, and build integrations."
  duration: "90 min"
  audience: "Python developers, plugin authors"
  items:
    - docs/build-sites/extend/_index
    - docs/build-sites/extend/build-hooks
    - docs/build-sites/extend/custom-directives
    - docs/build-sites/extend/custom-sources
    - docs/build-sites/extend/collections
    - docs/build-sites/extend/theme-customization
