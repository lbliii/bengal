# Versioning configuration
# See: docs/content/versioning/ for full documentation

versioning:
  enabled: true
  mode: git

  # Sections to version (only these sections get version prefixes)
  sections:
    - docs

  # Dogfood Bengal's automatic Git tag versioning on the real docs site:
  # build /docs/ from main, plus the newest three stable release tags.
  git:
    latest:
      branch: main
      id: main
      label: Latest

    previous:
      source: releases/tags
      count: 3
      pattern: "v*"
      strip_prefix: "v"
      sort: semver-desc
      include_prereleases: false

    default_branch: main
    cache_worktrees: true
    parallel_builds: 2

  # Aliases for friendly URLs
  aliases:
    latest: main
    stable: main
